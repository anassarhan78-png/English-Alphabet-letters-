<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Spinning Wheel Game | Phonics Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(145deg, #1e2a3a, #0f172a);
            font-family: 'Inter', 'Comic Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 30% 50%, rgba(255, 179, 71, 0.15), transparent 70%);
            animation: gentleMove 8s infinite alternate;
            z-index: 0;
        }
        
        @keyframes gentleMove {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }
        
        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 179, 71, 0.4);
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFB347, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .sub {
            color: #FFE0B5;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        
        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            cursor: pointer;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: box-shadow 0.3s ease;
        }
        
        canvas:hover {
            box-shadow: 0 12px 35px rgba(255, 179, 71, 0.3);
        }
        
        .spin-btn {
            background: linear-gradient(135deg, #FFB347, #FF6B6B);
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin: 20px 0;
            color: white;
            transition: all 0.3s ease;
        }
        
        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        .spin-btn:active {
            transform: translateY(1px);
        }
        
        .question-area {
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(255, 179, 71, 0.1));
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .question-text {
            font-size: 1.2rem;
            color: #FFE0B5;
            margin-bottom: 0.8rem;
        }
        
        .target-word {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            color: white;
            margin-bottom: 1rem;
        }
        
        .result-area {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 179, 71, 0.3);
        }
        
        .result-image {
            width: 100px;
            height: 100px;
            background: #0f172a;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #FFB347;
        }
        
        .result-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .result-word {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FFB347, #FF6B6B);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            color: white;
        }
        
        .sound-btn {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border: none;
            padding: 10px 20px;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .sound-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(56, 189, 248, 0.4);
        }
        
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: bold;
            animation: bounce 0.3s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .message.correct {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .message.wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .message.info {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #475569, #334155);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: bold;
            color: white;
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #5a6a7e, #3b4a5e);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #FFB347;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
            color: #FFD966;
        }
        
        @media (max-width: 600px) {
            .game-container { padding: 1rem; }
            .wheel-wrapper { width: 250px; height: 250px; }
            .result-image { width: 70px; height: 70px; }
            .result-word { font-size: 1.3rem; }
            .target-word { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>

<div class="game-container">
    <h1><i class="fas fa-cog fa-spin"></i> Spinning Wheel</h1>
    <div class="sub">Spin the wheel, then click on the correct word!</div>
    
    <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>
    
    <button id="spinBtn" class="spin-btn"><i class="fas fa-sync-alt"></i> SPIN THE WHEEL!</button>
    
    <div class="question-area" id="questionArea" style="display: none;">
        <div class="question-text">🎯 Click on this word in the wheel:</div>
        <div class="target-word" id="targetWord">—</div>
        <button id="repeatTargetBtn" class="sound-btn"><i class="fas fa-volume-up"></i> Listen Again</button>
    </div>
    
    <div class="result-area" id="resultArea" style="display: none;">
        <div class="result-image" id="resultImage"><i class="fas fa-spinner fa-pulse"></i></div>
        <div class="result-word" id="resultWord">—</div>
        <button id="speakResultBtn" class="sound-btn"><i class="fas fa-volume-up"></i> Listen</button>
    </div>
    
    <div id="messageBox" class="message"></div>
    
    <button id="resetBtn" class="reset-btn"><i class="fas fa-undo-alt"></i> New Game</button>
    <div><a href="../index.html" class="back-link"><i class="fas fa-home"></i> Back to Hub</a></div>
</div>

<script>
    const segments = [
        { word: "Apple", img: "https://cdn.pixabay.com/photo/2020/05/23/16/22/apple-5210665_640.jpg", fallback: "🍎", color: "#ff6b6b" },
        { word: "Ant", img: "https://cdn.pixabay.com/photo/2016/04/19/18/01/ant-1339560_640.jpg", fallback: "🐜", color: "#4ecdc4" },
        { word: "Ball", img: "https://cdn.pixabay.com/photo/2012/04/26/21/27/ball-43370_640.png", fallback: "⚽", color: "#ff6b6b" },
        { word: "Banana", img: "https://cdn.pixabay.com/photo/2017/07/10/23/45/bananas-2491881_640.jpg", fallback: "🍌", color: "#4ecdc4" },
        { word: "Cat", img: "https://cdn.pixabay.com/photo/2017/11/09/21/41/cat-2934720_640.jpg", fallback: "🐱", color: "#ff6b6b" },
        { word: "Car", img: "https://cdn.pixabay.com/photo/2014/07/31/23/10/car-407178_640.jpg", fallback: "🚗", color: "#4ecdc4" },
        { word: "Dog", img: "https://cdn.pixabay.com/photo/2016/12/13/05/15/puppy-1903313_640.jpg", fallback: "🐕", color: "#ff6b6b" },
        { word: "Duck", img: "https://cdn.pixabay.com/photo/2017/08/27/16/46/duck-2687207_640.jpg", fallback: "🦆", color: "#4ecdc4" }
    ];
    
    const segmentCount = segments.length;
    let currentAngle = 0;
    let isSpinning = false;
    let currentTargetSegment = null;
    let waitingForAnswer = false;
    
    const spinDuration = 2000;
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    // Get click/tap position on canvas
    function getClickSegment(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        const centerX = width / 2;
        const centerY = height / 2;
        const dx = canvasX - centerX;
        const dy = canvasY - centerY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const radius = width / 2 - 5;
        
        // Check if click is inside the wheel (not in center)
        if (distance < radius * 0.15 || distance > radius) {
            return null;
        }
        
        let angle = Math.atan2(dy, dx);
        if (angle < 0) angle += 2 * Math.PI;
        
        // Adjust angle based on current wheel rotation
        let relativeAngle = (angle - currentAngle) % (2 * Math.PI);
        if (relativeAngle < 0) relativeAngle += 2 * Math.PI;
        
        const angleStep = (2 * Math.PI) / segmentCount;
        let idx = Math.floor(relativeAngle / angleStep);
        idx = Math.min(idx, segmentCount - 1);
        
        return idx;
    }
    
    // Handle click on wheel
    function handleWheelClick(e) {
        if (!waitingForAnswer) return;
        
        const idx = getClickSegment(e);
        if (idx === null) return;
        
        const clickedSegment = segments[idx];
        
        if (clickedSegment.word === currentTargetSegment.word) {
            // Correct answer!
            showMessage(`✅ Correct! ${clickedSegment.word}! Great job! ✅`, 'correct');
            displayResult(currentTargetSegment);
            waitingForAnswer = false;
            document.getElementById('questionArea').style.display = 'none';
            speakText(`Correct! ${clickedSegment.word}! Well done!`);
        } else {
            // Wrong answer
            showMessage(`❌ Wrong! That's ${clickedSegment.word}. Click on ${currentTargetSegment.word} ❌`, 'wrong');
            speakText(`That's ${clickedSegment.word}. Try again! Click on ${currentTargetSegment.word}`);
        }
    }
    
    function resizeCanvas() {
        const size = canvas.parentElement.clientWidth;
        canvas.width = size;
        canvas.height = size;
        width = size;
        height = size;
        drawWheel();
    }
    
    function drawWheel() {
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = width / 2 - 5;
        const angleStep = (Math.PI * 2) / segmentCount;
        
        for (let i = 0; i < segmentCount; i++) {
            const startAngle = i * angleStep + currentAngle;
            const endAngle = (i + 1) * angleStep + currentAngle;
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.fillStyle = segments[i].color;
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + angleStep / 2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const fontSize = Math.floor(radius * 0.1);
            ctx.font = `bold ${fontSize}px "Inter", "Comic Neue"`;
            ctx.fillStyle = "white";
            ctx.shadowBlur = 0;
            ctx.fillText(segments[i].word, radius * 0.7, 0);
            ctx.restore();
        }
        
        // Draw center circle
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * 0.12, 0, 2 * Math.PI);
        ctx.fillStyle = "#f39c12";
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Draw pointer
        ctx.beginPath();
        ctx.moveTo(centerX - 12, 15);
        ctx.lineTo(centerX, -8);
        ctx.lineTo(centerX + 12, 15);
        ctx.fillStyle = "#f39c12";
        ctx.fill();
    }
    
    function getRandomFinalAngle() {
        const extraSpins = 5 + Math.random() * 3; // 5-8 full spins
        return currentAngle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
    }
    
    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        waitingForAnswer = false;
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('messageBox').innerHTML = '';
        
        const startAngle = currentAngle;
        const targetAngle = getRandomFinalAngle();
        const startTime = performance.now();
        
        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / spinDuration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            currentAngle = startAngle + (targetAngle - startAngle) * easeOut;
            drawWheel();
            
            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                currentAngle = targetAngle % (2 * Math.PI);
                drawWheel();
                isSpinning = false;
                determineSegmentAndAsk();
            }
        }
        
        requestAnimationFrame(animate);
    }
    
    function determineSegmentAndAsk() {
        let angle = currentAngle % (2 * Math.PI);
        if (angle < 0) angle += 2 * Math.PI;
        
        const angleStep = (2 * Math.PI) / segmentCount;
        const pointerAngle = 3 * Math.PI / 2;
        let relativeAngle = (pointerAngle - currentAngle) % (2 * Math.PI);
        if (relativeAngle < 0) relativeAngle += 2 * Math.PI;
        
        let idx = Math.floor(relativeAngle / angleStep);
        idx = Math.min(idx, segmentCount - 1);
        
        currentTargetSegment = segments[idx];
        
        // Ask the student to click on the correct word
        waitingForAnswer = true;
        const targetWordSpan = document.getElementById('targetWord');
        targetWordSpan.textContent = currentTargetSegment.word;
        
        const questionArea = document.getElementById('questionArea');
        questionArea.style.display = 'block';
        
        showMessage(`🎯 Click on "${currentTargetSegment.word}" in the wheel!`, 'info');
        speakText(`Find and click on ${currentTargetSegment.word}`);
    }
    
    function displayResult(segment) {
        const imgEl = document.getElementById('resultImage');
        const wordEl = document.getElementById('resultWord');
        const resultArea = document.getElementById('resultArea');
        
        const img = new Image();
        img.onload = () => {
            imgEl.innerHTML = '';
            imgEl.appendChild(img);
        };
        img.onerror = () => {
            imgEl.innerHTML = `<span style="font-size: 2rem;">${segment.fallback}</span>`;
        };
        img.src = segment.img;
        wordEl.textContent = segment.word;
        resultArea.style.display = 'flex';
        
        const speakBtn = document.getElementById('speakResultBtn');
        speakBtn.onclick = () => speakText(segment.word);
        speakText(segment.word);
    }
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('messageBox');
        msgDiv.textContent = msg;
        msgDiv.className = `message ${type}`;
        setTimeout(() => {
            if (msgDiv.textContent === msg) {
                msgDiv.innerHTML = '';
                msgDiv.className = 'message';
            }
        }, 3000);
    }
    
    function speakText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.9;
        u.pitch = 1.1;
        window.speechSynthesis.speak(u);
    }
    
    function repeatTarget() {
        if (currentTargetSegment) {
            speakText(`Click on ${currentTargetSegment.word}`);
        }
    }
    
    function resetGame() {
        waitingForAnswer = false;
        currentTargetSegment = null;
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('messageBox').innerHTML = '';
        showMessage('Game reset! Click SPIN to start a new round!', 'info');
    }
    
    // Event listeners
    canvas.addEventListener('click', handleWheelClick);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
        handleWheelClick(fakeEvent);
    });
    
    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    document.getElementById('repeatTargetBtn').addEventListener('click', repeatTarget);
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // Show initial message
    showMessage('Click SPIN to start the game!', 'info');
</script>
</body>
</html>
