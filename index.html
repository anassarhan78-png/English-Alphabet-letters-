<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة تعلم الحروف | Phonics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="platform-container">
        <header class="main-header">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>منصة تعلم الحروف</h1>
            </div>
            <p class="subtitle">Phonics Platform | 26 حرفاً | 40+ لعبة تفاعلية</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <i class="fas fa-letters"></i>
                <span>26 حرفاً</span>
            </div>
            <div class="stat">
                <i class="fas fa-gamepad"></i>
                <span>40+ لعبة</span>
            </div>
            <div class="stat">
                <i class="fas fa-image"></i>
                <span>صور من الإنترنت</span>
            </div>
            <div class="stat">
                <i class="fas fa-volume-up"></i>
                <span>نطق صوتي</span>
            </div>
        </div>

        <div class="letters-grid" id="lettersGrid">
            <!-- سيتم إنشاء الحروف بواسطة JavaScript -->
        </div>

        <footer class="main-footer">
            <p>🌟 تعلم الحروف بالصوتيات | أنشطة تفاعلية للأطفال</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="games-library.js"></script>
    <script src="script.js"></script>
</body>
</html>
