<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter A | Phonics Nexus</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    background:#0a0f1e;
    font-family:'Inter',sans-serif;
    color:#eef2ff;
    padding:2rem;
}
.container {
    max-width:1000px;
    margin:auto;
    background:rgba(20,30,50,0.6);
    border-radius:2rem;
    padding:2rem;
}
h1 { text-align:center; }

.trace-card {
    text-align:center;
    margin:2rem 0;
}

canvas {
    background:white;
    border-radius:1rem;
    width:100%;
    max-width:320px;
}

.btn {
    background:#38bdf8;
    border:none;
    padding:0.5rem 1rem;
    border-radius:1rem;
    cursor:pointer;
    margin-top:10px;
}

.words-grid {
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    justify-content:center;
}

.word-card {
    width:150px;
    background:rgba(255,255,255,0.1);
    padding:1rem;
    border-radius:1rem;
    text-align:center;
    cursor:pointer;
}

.word-card img {
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>A a</h1>

<div class="trace-card">
<canvas id="canvas" width="320" height="220"></canvas>
<br>
<button class="btn" onclick="resetCanvas()">Clear</button>
<button class="btn" onclick="speakSound()">Sound</button>
</div>

<h2 style="text-align:center;">Words</h2>

<div class="words-grid">

<div class="word-card" onclick="speakText('apple')">
<img src="https://cdn.pixabay.com/photo/2016/02/18/18/57/apple-1207991_640.jpg">
<p>Apple</p>
</div>

<div class="word-card" onclick="speakText('ant')">
<img src="https://cdn.pixabay.com/photo/2017/07/14/21/06/ant-2500906_640.jpg">
<p>Ant</p>
</div>

<div class="word-card" onclick="speakText('alligator')">
<img src="https://cdn.pixabay.com/photo/2017/01/06/19/15/alligator-1958532_640.jpg">
<p>Alligator</p>
</div>

</div>

</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function drawGuide(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 4 lines
    const lines = [40,80,140,180];
    ctx.strokeStyle="#aaa";
    ctx.lineWidth=2;

    lines.forEach(y=>{
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);
        ctx.stroke();
    });

    // Capital A
    ctx.font="bold 60px Arial";
    ctx.fillStyle="#ddd";
    ctx.textAlign="center";
    ctx.fillText("A",120,90);

    // small a
    ctx.font="50px Arial";
    ctx.fillText("a",200,170);
}

drawGuide();

let drawing=false;

canvas.addEventListener('mousedown',e=>{
    drawing=true;
    ctx.beginPath();
});

canvas.addEventListener('mousemove',e=>{
    if(!drawing) return;
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;

    ctx.lineWidth=10;
    ctx.lineCap="round";
    ctx.strokeStyle="#ff8c42";

    ctx.lineTo(x,y);
    ctx.stroke();
});

canvas.addEventListener('mouseup',()=>{
    drawing=false;
});

function resetCanvas(){
    drawGuide();
}

function speakText(text){
    let u=new SpeechSynthesisUtterance(text);
    u.rate=0.8;
    u.pitch=1.2;
    speechSynthesis.speak(u);
}

function speakSound(){
    speakText("æ æ æ apple");
}
</script>

</body>
</html>
