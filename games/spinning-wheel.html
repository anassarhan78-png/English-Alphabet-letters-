<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Spinning Wheel Game | Phonics Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(56,189,248,0.3);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a5f3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .instructions {
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .spin-btn {
            background: #f39c12;
            border: none;
            padding: 12px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin: 20px 0;
            transition: 0.2s;
            color: #1e293b;
            box-shadow: 0 4px 0 #b45f1b;
        }
        .spin-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45f1b;
        }

        .current-word {
            background: #2c3e50;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .current-word span {
            color: #f39c12;
            font-size: 1.4rem;
        }

        .options-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .option-card {
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 1rem;
            width: 100px;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-card:hover {
            transform: scale(1.02);
            background: #334155;
        }
        .option-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .option-card span {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .option-card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .score-area {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .feedback {
            margin: 0.5rem 0;
            font-weight: bold;
        }
        .feedback.correct { color: #2ecc71; }
        .feedback.wrong { color: #e74c3c; }

        .next-btn {
            background: #38bdf8;
            border: none;
            padding: 8px 20px;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #38bdf8;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .game-container { padding: 1rem; }
            .wheel-wrapper { width: 220px; height: 220px; }
            .option-card { width: 80px; }
            .option-card img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1><i class="fas fa-cog"></i> Spinning Wheel Challenge <i class="fas fa-chalkboard"></i></h1>
    <div class="instructions">Spin the wheel, then click on the correct picture that matches the word!</div>

    <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>

    <div>
        <button id="spinBtn" class="spin-btn"><i class="fas fa-sync-alt"></i> SPIN!</button>
    </div>

    <div class="current-word" id="currentWordDisplay">Current word: <span id="currentWord">—</span></div>

    <div id="optionsArea" class="options-area"></div>

    <div class="score-area">
        Score: <span id="score">0</span> / <span id="totalQuestions">0</span>
    </div>
    <div id="feedback" class="feedback"></div>

    <button id="nextBtn" class="next-btn" style="display: none;">Next Word</button>

    <a href="../index.html" class="back-link"><i class="fas fa-home"></i> Back to Main</a>
</div>

<script>
    // Data for wheel segments (same as before)
    const segments = [
        { word: "Apple", img: "../images/apple.jpg", fallback: "🍎" },
        { word: "Ant", img: "../images/ant.jpg", fallback: "🐜" },
        { word: "Ball", img: "../images/ball.jpg", fallback: "⚽" },
        { word: "Banana", img: "../images/banana.jpg", fallback: "🍌" },
        { word: "Cat", img: "../images/cat.jpg", fallback: "🐱" },
        { word: "Car", img: "../images/car.jpg", fallback: "🚗" },
        { word: "Dog", img: "../images/dog.jpg", fallback: "🐕" },
        { word: "Duck", img: "../images/duck.jpg", fallback: "🦆" }
    ];

    let currentWordObj = null;
    let score = 0;
    let totalQuestions = 0;
    let gameLocked = false; // after spin and before answer
    let currentOptions = [];

    // Wheel variables
    let currentAngle = 0;
    let isSpinning = false;
    const spinDuration = 2000;
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resizeCanvas() {
        const container = canvas.parentElement;
        const size = container.clientWidth;
        canvas.width = size;
        canvas.height = size;
        width = size;
        height = size;
        drawWheel();
    }

    function drawWheel() {
        if (!ctx) return;
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = width / 2 - 5;
        const angleStep = (Math.PI * 2) / segments.length;

        for (let i = 0; i < segments.length; i++) {
            const startAngle = i * angleStep + currentAngle;
            const endAngle = (i + 1) * angleStep + currentAngle;
            const seg = segments[i];
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.closePath();
            ctx.fillStyle = i % 2 === 0 ? "#ff6b6b" : "#4ecdc4";
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + angleStep / 2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `bold ${Math.floor(radius * 0.12)}px "Inter", sans-serif`;
            ctx.fillStyle = "white";
            ctx.shadowBlur = 2;
            ctx.fillText(seg.word, radius * 0.65, 0);
            ctx.restore();
        }

        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * 0.12, 0, 2 * Math.PI);
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(centerX - 12, 10);
        ctx.lineTo(centerX, -8);
        ctx.lineTo(centerX + 12, 10);
        ctx.fillStyle = "#f39c12";
        ctx.fill();
    }

    function getRandomFinalAngle() {
        const extraSpins = 5 * 2 * Math.PI;
        const randomOffset = Math.random() * 2 * Math.PI;
        return currentAngle + extraSpins + randomOffset;
    }

    function spinWheel() {
        if (isSpinning || gameLocked) return;
        isSpinning = true;
        const startAngle = currentAngle;
        const targetAngle = getRandomFinalAngle();
        const startTime = performance.now();

        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / spinDuration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            currentAngle = startAngle + (targetAngle - startAngle) * easeOut;
            drawWheel();
            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                currentAngle = targetAngle % (2 * Math.PI);
                drawWheel();
                isSpinning = false;
                determineSegment();
            }
        }
        requestAnimationFrame(animate);
    }

    function determineSegment() {
        let angle = currentAngle % (2 * Math.PI);
        if (angle < 0) angle += 2 * Math.PI;
        const angleStep = (2 * Math.PI) / segments.length;
        const pointerAngle = (3 * Math.PI) / 2;
        let relativeAngle = (pointerAngle - currentAngle) % (2 * Math.PI);
        if (relativeAngle < 0) relativeAngle += 2 * Math.PI;
        let idx = Math.floor(relativeAngle / angleStep);
        idx = Math.min(idx, segments.length - 1);
        const selected = segments[idx];
        startNewQuestion(selected);
    }

    function startNewQuestion(selected) {
        currentWordObj = selected;
        document.getElementById('currentWord').innerText = selected.word;
        document.getElementById('currentWordDisplay').style.display = 'block';

        // Generate 3 random other words (distinct) for options
        let otherWords = segments.filter(s => s.word !== selected.word);
        // Shuffle otherWords
        for (let i = otherWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [otherWords[i], otherWords[j]] = [otherWords[j], otherWords[i]];
        }
        const options = [selected, ...otherWords.slice(0, 3)];
        // Shuffle options
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        currentOptions = options;

        // Render options area
        const optionsDiv = document.getElementById('optionsArea');
        optionsDiv.innerHTML = '';
        currentOptions.forEach((opt, idx) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            const img = document.createElement('img');
            img.src = opt.img;
            img.onerror = () => { img.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='white'%3E${opt.fallback}%3C/text%3E%3C/svg%3E`; };
            card.appendChild(img);
            const span = document.createElement('span');
            span.innerText = opt.word;
            card.appendChild(span);
            card.onclick = () => handleAnswer(opt);
            optionsDiv.appendChild(card);
        });

        gameLocked = true;
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('spinBtn').disabled = true;
    }

    function handleAnswer(selected) {
        if (!gameLocked) return;
        const isCorrect = (selected.word === currentWordObj.word);
        const feedbackDiv = document.getElementById('feedback');
        if (isCorrect) {
            score++;
            feedbackDiv.innerHTML = '✅ Correct! Great job! ✅';
            feedbackDiv.className = 'feedback correct';
            speakText(`Correct! ${currentWordObj.word}`);
        } else {
            feedbackDiv.innerHTML = `❌ Wrong! The correct word was ${currentWordObj.word}. Try next! ❌`;
            feedbackDiv.className = 'feedback wrong';
            speakText(`The correct word is ${currentWordObj.word}`);
        }
        totalQuestions++;
        updateScoreDisplay();

        // Disable all options
        document.querySelectorAll('.option-card').forEach(card => {
            card.style.pointerEvents = 'none';
        });
        // Show next button
        document.getElementById('nextBtn').style.display = 'inline-block';
        gameLocked = false;
        document.getElementById('spinBtn').disabled = false;
    }

    function updateScoreDisplay() {
        document.getElementById('score').innerText = score;
        document.getElementById('totalQuestions').innerText = totalQuestions;
    }

    function nextQuestion() {
        // Reset for next spin
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('currentWord').innerText = '—';
        document.getElementById('optionsArea').innerHTML = '<div style="padding:1rem;">Spin the wheel to begin!</div>';
        gameLocked = false;
        // Spin is allowed again
    }

    function speakText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    window.addEventListener('resize', () => { resizeCanvas(); });
    resizeCanvas();
    drawWheel();

    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);

    // Initial state: show placeholder
    document.getElementById('optionsArea').innerHTML = '<div style="padding:1rem;">Spin the wheel to begin!</div>';
    document.getElementById('currentWordDisplay').style.display = 'block';
    document.getElementById('currentWord').innerText = '—';
</script>
</body>
</html>
