<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Magnetic Letters on the Fridge | Phonics Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e2a3a, #0f172a);
            font-family: 'Inter', 'Comic Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 70% 30%, rgba(56, 189, 248, 0.15), transparent 70%);
            animation: gentleMove 8s infinite alternate;
            z-index: 0;
        }

        @keyframes gentleMove {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(56, 189, 248, 0.4);
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #a5f3fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #FFE0B5;
            margin-bottom: 1.5rem;
        }

        .play-area {
            display: flex;
            flex-direction: row;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* Left side: letters board */
        .letters-board {
            flex: 2;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 1rem;
            order: 1;
        }

        .letters-board h2 {
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
            color: #38bdf8;
        }

        .letters-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 500px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .letter-magnet {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #2c3e50;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            touch-action: none;
        }

        .letter-magnet:active {
            cursor: grabbing;
        }

        .letter-magnet.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        /* Right side: fridge */
        .fridge-area {
            flex: 3;
            min-width: 280px;
            background: linear-gradient(145deg, #bdc3c7, #a0a0a0);
            background-image: radial-gradient(circle at 10px 10px, rgba(100, 100, 100, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 1.5rem;
            padding: 1rem;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2), 0 8px 12px rgba(0,0,0,0.1);
            order: 2;
            transition: all 0.3s ease;
        }

        .fridge-area.drag-over {
            background: linear-gradient(145deg, #d5dbdb, #b0b0b0);
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.5), 0 8px 12px rgba(0,0,0,0.1);
        }

        .fridge-area h2 {
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
            color: #4a5b6e;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        .fridge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-start;
            min-height: 400px;
            background: rgba(255, 255, 240, 0.5);
            border-radius: 1rem;
            padding: 1rem;
        }

        .fridge-letter {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #2c3e50;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            animation: bounceIn 0.3s ease;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            80% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Controls */
        .control-bar {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .current-target {
            background: linear-gradient(135deg, #2c3e50, #1e293b);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid #38bdf8;
        }

        .target-label {
            color: #FFE0B5;
        }

        .target-letter {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            padding: 0 1rem;
            border-radius: 2rem;
            color: white;
            min-width: 70px;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }

        .message {
            margin-top: 1rem;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            padding: 0.5rem;
            border-radius: 2rem;
        }

        .message.correct {
            color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }

        .message.wrong {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.2);
        }

        @media (max-width: 800px) {
            .letter-magnet { width: 50px; height: 50px; font-size: 1.6rem; }
            .fridge-letter { width: 55px; height: 55px; font-size: 1.6rem; }
            .target-letter { font-size: 1.5rem; min-width: 55px; }
            .play-area { flex-direction: column; }
            .letters-board { order: 2; }
            .fridge-area { order: 1; }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>

<div class="game-container">
    <h1><i class="fas fa-magnet"></i> Magnetic Letters on the Fridge</h1>
    <div class="sub">Drag the correct letter to the fridge!</div>

    <div class="play-area">
        <!-- Left side: magnetic letters (drag source) -->
        <div class="letters-board">
            <h2><i class="fas fa-letters"></i> Magnetic Letters</h2>
            <div id="lettersContainer" class="letters-grid"></div>
        </div>

        <!-- Right side: fridge (drop target) -->
        <div class="fridge-area" id="fridgeArea">
            <h2><i class="fas fa-ice-cream"></i> Fridge</h2>
            <div id="fridgeContainer" class="fridge-grid"></div>
        </div>
    </div>

    <div class="control-bar">
        <div class="current-target">
            <span class="target-label">🎯 Current letter:</span>
            <span id="targetLetter" class="target-letter">—</span>
        </div>
        <button id="skipLetterBtn">⏭️ Skip letter</button>
        <button id="resetGameBtn"><i class="fas fa-undo-alt"></i> New Game</button>
    </div>
    <div id="messageBox" class="message"></div>
</div>

<script>
    // All letters (uppercase only for simplicity)
    const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    // Game state
    let availableLetters = [...allLetters];
    let placedLetters = [];
    let currentTarget = null;
    let gameActive = true;

    // DOM elements
    const lettersContainer = document.getElementById('lettersContainer');
    const fridgeContainer = document.getElementById('fridgeContainer');
    const fridgeArea = document.getElementById('fridgeArea');
    const targetSpan = document.getElementById('targetLetter');
    const messageBox = document.getElementById('messageBox');

    let draggedLetter = null;

    // Speak the letter (only after placement)
    function speakLetter(letter, isCorrect = true) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        let textToSpeak = `Letter ${letter}`;
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    function speakMessage(msg) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    // Choose a new random target from available letters
    function pickNewTarget() {
        if (availableLetters.length === 0) {
            messageBox.innerText = '🎉 Congratulations! You placed all letters on the fridge! 🎉';
            messageBox.className = 'message correct';
            gameActive = false;
            targetSpan.innerText = '🏆';
            return null;
        }
        const randomIndex = Math.floor(Math.random() * availableLetters.length);
        const newTarget = availableLetters[randomIndex];
        currentTarget = newTarget;
        targetSpan.innerText = newTarget;
        messageBox.innerText = `🔊 Find the letter "${newTarget}" and drag it to the fridge.`;
        messageBox.className = 'message';
        return newTarget;
    }

    // Render the left side letters (only available letters)
    function renderLeft() {
        lettersContainer.innerHTML = '';
        availableLetters.forEach(letter => {
            const div = document.createElement('div');
            div.className = 'letter-magnet';
            div.textContent = letter;
            div.setAttribute('data-letter', letter);
            div.setAttribute('draggable', 'true');
            
            // Drag start
            div.addEventListener('dragstart', (e) => {
                if (!gameActive) {
                    e.preventDefault();
                    return false;
                }
                draggedLetter = letter;
                e.dataTransfer.setData('text/plain', letter);
                e.dataTransfer.effectAllowed = 'move';
                div.classList.add('dragging');
            });
            
            // Drag end
            div.addEventListener('dragend', (e) => {
                div.classList.remove('dragging');
                draggedLetter = null;
            });
            
            // Touch events for mobile
            div.addEventListener('touchstart', (e) => {
                if (!gameActive) return;
                draggedLetter = letter;
                e.target.style.opacity = '0.5';
            });
            
            div.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                if (dropTarget && (dropTarget === fridgeArea || fridgeArea.contains(dropTarget))) {
                    fridgeArea.classList.add('drag-over');
                } else {
                    fridgeArea.classList.remove('drag-over');
                }
            });
            
            div.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                if (dropTarget && (dropTarget === fridgeArea || fridgeArea.contains(dropTarget))) {
                    attemptPlaceFromDrag(letter);
                }
                e.target.style.opacity = '1';
                fridgeArea.classList.remove('drag-over');
                draggedLetter = null;
            });
            
            lettersContainer.appendChild(div);
        });
    }

    // Render the fridge (placed letters)
    function renderFridge() {
        fridgeContainer.innerHTML = '';
        placedLetters.forEach(letter => {
            const div = document.createElement('div');
            div.className = 'fridge-letter';
            div.textContent = letter;
            fridgeContainer.appendChild(div);
        });
    }

    // Attempt to place a dragged letter
    function attemptPlaceFromDrag(letter) {
        if (!gameActive) return;
        
        if (letter !== currentTarget) {
            // Wrong letter
            messageBox.innerText = `❌ That's not the letter ${currentTarget}! Try again! ❌`;
            messageBox.className = 'message wrong';
            return;
        }

        // Correct letter!
        const index = availableLetters.indexOf(letter);
        if (index !== -1) {
            availableLetters.splice(index, 1);
            placedLetters.push(letter);
        }
        
        // Re-render both sides
        renderLeft();
        renderFridge();

        // Play sound ONLY after placing on fridge
        speakLetter(letter);

        // Show success message
        messageBox.innerText = `✅ Correct! ${letter} is on the fridge! ✅`;
        messageBox.className = 'message correct';

        // Check if game is finished
        if (availableLetters.length === 0) {
            messageBox.innerText = '🎉 Congratulations! You placed all letters on the fridge! 🎉';
            messageBox.className = 'message correct';
            gameActive = false;
            targetSpan.innerText = '🏆';
            return;
        }

        // Pick next target letter
        pickNewTarget();
    }

    // Drag over fridge area
    fridgeArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        fridgeArea.classList.add('drag-over');
    });

    fridgeArea.addEventListener('dragleave', (e) => {
        fridgeArea.classList.remove('drag-over');
    });

    // Drop on fridge
    fridgeArea.addEventListener('drop', (e) => {
        e.preventDefault();
        fridgeArea.classList.remove('drag-over');
        const letter = e.dataTransfer.getData('text/plain');
        if (letter && gameActive) {
            attemptPlaceFromDrag(letter);
        }
    });

    // Skip current letter
    function skipLetter() {
        if (!gameActive) return;
        if (availableLetters.length === 0) return;
        
        let newTarget = null;
        let attempts = 0;
        while (attempts < 50 && availableLetters.length > 1) {
            const rand = Math.floor(Math.random() * availableLetters.length);
            if (availableLetters[rand] !== currentTarget) {
                newTarget = availableLetters[rand];
                break;
            }
            attempts++;
        }
        if (!newTarget && availableLetters.length > 0) newTarget = availableLetters[0];
        
        if (newTarget) {
            currentTarget = newTarget;
            targetSpan.innerText = currentTarget;
            messageBox.innerText = `🔊 New letter: "${currentTarget}". Drag it to the fridge!`;
            messageBox.className = 'message';
        }
    }

    // Reset game
    function resetGame() {
        availableLetters = [...allLetters];
        placedLetters = [];
        gameActive = true;
        renderLeft();
        renderFridge();
        pickNewTarget();
    }

    // Event listeners
    document.getElementById('skipLetterBtn').addEventListener('click', skipLetter);
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);

    // Initialize
    resetGame();
</script>
</body>
</html>
