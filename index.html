<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة تعلم الحروف | Phonics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* إضافات خاصة لرابط My First Coding */
        .featured-link {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            margin: 20px 30px;
            border-radius: 60px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(243, 156, 18, 0.3);
        }
        
        .featured-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(243, 156, 18, 0.4);
        }
        
        .coding-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .coding-link i {
            font-size: 2rem;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .coding-link span {
            font-size: 1.1rem;
        }
        
        .badge-new {
            background: #e74c3c;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-right: 10px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .developer-credit {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .developer-badge {
            background: #2c3e50;
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
        }
        
        .developer-badge i {
            margin-left: 8px;
            color: #f39c12;
        }
    </style>
</head>
<body>
    <div class="platform-container">
        <header class="main-header">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>منصة تعلم الحروف</h1>
            </div>
            <p class="subtitle">Phonics Platform | 26 حرفاً | 40+ لعبة تفاعلية</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <i class="fas fa-letters"></i>
                <span>26 حرفاً</span>
            </div>
            <div class="stat">
                <i class="fas fa-gamepad"></i>
                <span>40+ لعبة</span>
            </div>
            <div class="stat">
                <i class="fas fa-image"></i>
                <span>صور من الإنترنت</span>
            </div>
            <div class="stat">
                <i class="fas fa-volume-up"></i>
                <span>نطق صوتي</span>
            </div>
        </div>

        <!-- رابط My First Coding YAY! المميز -->
        <div class="featured-link">
            <a href="my-first-coding.html" class="coding-link">
                <i class="fas fa-code"></i>
                <span>✨ My First Coding YAY! ✨</span>
                <i class="fas fa-laugh-beam"></i>
                <span class="badge-new">NEW</span>
            </a>
            <div style="padding: 0 20px 15px 20px; font-size: 0.8rem; color: rgba(255,255,255,0.9);">
                <i class="fas fa-graduation-cap"></i> تعلم الدمج التراكمي | ابدأ بالحرف A وافتح الباقي تدريجياً
            </div>
        </div>

        <div class="letters-grid" id="lettersGrid">
            <!-- سيتم إنشاء الحروف بواسطة JavaScript -->
        </div>

        <div class="developer-credit">
            <div class="developer-badge">
                <i class="fas fa-code"></i> Developed by Anas Abdulrahman
            </div>
        </div>

        <footer class="main-footer">
            <p>🌟 تعلم الحروف بالصوتيات | أنشطة تفاعلية للأطفال | دمج تراكمي تصاعدي 🌟</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="games-library.js"></script>
    <script src="script.js"></script>
</body>
</html>
