<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Listen & Click | Phonics Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .game-container {
            background: white;
            border-radius: 2rem;
            max-width: 800px;
            width: 100%;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .instructions {
            color: #7f8c8d;
            margin-bottom: 1.5rem;
        }
        .current-letter {
            font-size: 2rem;
            background: #fef5e7;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .letter-btn {
            background: #3498db;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .letter-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }
        .score {
            font-size: 1.2rem;
            margin: 1rem 0;
        }
        .feedback {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .reset-btn {
            background: #e67e22;
            margin-top: 1rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            background: #2c3e50;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1><i class="fas fa-ear-listen"></i> Listen & Click</h1>
    <div class="instructions">استمع جيداً ثم اضغط على الحرف الذي سمعته</div>

    <div id="gameContent">
        <div class="current-letter" id="currentLetterDisplay">?</div>
        <div class="options" id="optionsContainer"></div>
        <div class="score">النقاط: <span id="score">0</span> / <span id="totalQuestions">0</span></div>
        <div id="feedback" class="feedback"></div>
        <button id="nextBtn" class="reset-btn">➡️ التالي</button>
    </div>

    <a href="../index.html" class="back-link"><i class="fas fa-home"></i> العودة للبوابة الرئيسية</a>
</div>

<script>
    // قائمة الحروف التي ستظهر في اللعبة
    const letters = ['A', 'B', 'C', 'D', 'E'];
    let currentLetter = null;
    let score = 0;
    let totalQuestions = 0;
    let waitingForAnswer = true;

    // عناصر DOM
    const optionsContainer = document.getElementById('optionsContainer');
    const currentLetterDisplay = document.getElementById('currentLetterDisplay');
    const scoreSpan = document.getElementById('score');
    const totalSpan = document.getElementById('totalQuestions');
    const feedbackDiv = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');

    // وظيفة النطق
    function speakText(text) {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }
    }

    // توليد خيارات عشوائية (بما فيها الحرف الصحيح)
    function generateOptions(correct) {
        let options = [correct];
        while (options.length < 4) {
            let randomLetter = letters[Math.floor(Math.random() * letters.length)];
            if (!options.includes(randomLetter)) options.push(randomLetter);
        }
        // خلط الخيارات
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return options;
    }

    // عرض الخيارات على الشاشة
    function renderOptions(options) {
        optionsContainer.innerHTML = '';
        options.forEach(letter => {
            const btn = document.createElement('button');
            btn.textContent = letter;
            btn.classList.add('letter-btn');
            btn.onclick = () => checkAnswer(letter);
            optionsContainer.appendChild(btn);
        });
    }

    // بدء جولة جديدة
    function newRound() {
        if (!waitingForAnswer) return;
        // اختيار حرف عشوائي من القائمة
        const randomIndex = Math.floor(Math.random() * letters.length);
        currentLetter = letters[randomIndex];
        currentLetterDisplay.textContent = currentLetter;
        // إنشاء الخيارات
        const options = generateOptions(currentLetter);
        renderOptions(options);
        // نطق الحرف بعد نصف ثانية
        setTimeout(() => {
            speakText(currentLetter);
        }, 300);
        waitingForAnswer = true;
        feedbackDiv.innerHTML = '';
    }

    // التحقق من الإجابة
    function checkAnswer(selected) {
        if (!waitingForAnswer) return;
        waitingForAnswer = false;
        totalQuestions++;
        if (selected === currentLetter) {
            score++;
            feedbackDiv.innerHTML = '✅ صحيح! أحسنت! ✅';
            feedbackDiv.style.color = '#2ecc71';
            speakText('Correct!');
        } else {
            feedbackDiv.innerHTML = `❌ خطأ! الحرف الصحيح هو ${currentLetter}. حاول مرة أخرى. ❌`;
            feedbackDiv.style.color = '#e74c3c';
            speakText(`Wrong. The correct letter is ${currentLetter}`);
        }
        scoreSpan.textContent = score;
        totalSpan.textContent = totalQuestions;
        // تعطيل الأزرار مؤقتاً
        document.querySelectorAll('.letter-btn').forEach(btn => btn.disabled = true);
        // زر "التالي" يظهر ويمكن الضغط عليه
        nextBtn.disabled = false;
    }

    // التالي: جولة جديدة
    function nextRound() {
        nextBtn.disabled = true;
        waitingForAnswer = true;
        feedbackDiv.innerHTML = '';
        document.querySelectorAll('.letter-btn').forEach(btn => btn.disabled = false);
        newRound();
    }

    // تهيئة اللعبة
    function initGame() {
        score = 0;
        totalQuestions = 0;
        scoreSpan.textContent = '0';
        totalSpan.textContent = '0';
        waitingForAnswer = true;
        nextBtn.disabled = true;
        newRound();
    }

    // ربط الأزرار
    nextBtn.addEventListener('click', nextRound);
    initGame();
</script>
</body>
</html>
