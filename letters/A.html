<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Letter A | Phonics Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* التنسيقات العامة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1e;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .back { color: #38bdf8; text-decoration: none; margin-bottom: 1.5rem; display: inline-block; }
        
        .letter-badge {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            padding: 0.2rem 1.5rem;
            border-radius: 3rem;
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Comic Neue', cursive;
        }

        /* تنسيق منطقة الكتابة */
        .trace-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin: 2rem 0;
        }
        .trace-card {
            width: 100%;
            max-width: 600px;
            background: white; /* خلفية بيضاء لتبدو كأنها ورقة كراسة */
            border-radius: 1rem;
            padding: 20px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: auto;
            cursor: crosshair;
            touch-action: none;
            display: block;
        }
        .controls {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn {
            background: #38bdf8;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        
        .words-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; margin-top: 20px; }
        .word-card { background: rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1rem; text-align: center; width: 160px; }
        .word-card img { width: 120px; height: 120px; border-radius: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back"><i class="fas fa-arrow-left"></i> Back to Hub</a>
    
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1><span class="letter-badge">Aa</span></h1>
        <p style="margin-top: 10px; font-size: 1.2rem;">Learn to write Letter A on 4 lines</p>
    </div>

    <div class="trace-section">
        <div class="trace-card">
            <canvas id="writingCanvas" width="600" height="300"></canvas>
            <div class="controls">
                <button class="btn" onclick="clearCanvas()"><i class="fas fa-eraser"></i> Clear</button>
                <button class="btn" style="background:#818cf8" onclick="speakText('A says /æ/ Apple')"><i class="fas fa-volume-up"></i> Listen</button>
            </div>
        </div>
    </div>

    <h2><i class="fas fa-image"></i> Words with A</h2>
    <div class="words-grid">
        <div class="word-card" onclick="speakText('Apple')">
            <img src="https://cdn.pixabay.com/photo/2020/05/23/16/22/apple-5210665_640.jpg" alt="apple">
            <h4>Apple</h4>
        </div>
        <div class="word-card" onclick="speakText('Ant')">
            <img src="https://cdn.pixabay.com/photo/2016/04/19/18/01/ant-1339560_640.jpg" alt="ant">
            <h4>Ant</h4>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('writingCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // إعدادات الأسطر (نظام 4 أسطر المدرسي)
    const lineSpacing = 60;
    const startY = 60;
    const lines = [startY, startY + lineSpacing, startY + 2 * lineSpacing, startY + 3 * lineSpacing];

    function init() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. رسم الأسطر الأربعة
        lines.forEach((y, index) => {
            ctx.beginPath();
            ctx.moveTo(20, y);
            ctx.lineTo(canvas.width - 20, y);
            // الخط العلوي والسفلي باللون الأحمر، والوسط باللون الأزرق (مثل الكراسات المدرسية)
            ctx.strokeStyle = (index === 0 || index === 3) ? "#ffcccc" : "#ccd6ff";
            ctx.lineWidth = 2;
            ctx.stroke();
        });

        // 2. رسم الحروف الشفافة (Dotted Letter) ليقوم الطالب بتتبعها
        ctx.font = 'bold 160px "Comic Neue", cursive';
        ctx.fillStyle = '#f0f0f0'; // لون رمادي فاتح جداً للتتبع
        ctx.textAlign = 'center';
        
        // وضع الحروف بدقة على الأسطر
        // الحرف الكبير من السطر 1 إلى 3
        // الحرف الصغير من السطر 2 إلى 3
        ctx.fillText('A', 180, lines[2]); 
        ctx.fillText('a', 420, lines[2]); 

        // إضافة توضيح لاسم الخطوط
        ctx.font = '12px Inter';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Sky Line', 40, lines[0] - 5);
        ctx.fillText('Grass Line (Base)', 60, lines[2] + 15);
    }

    // وظائف الرسم
    function startDrawing(e) {
        drawing = true;
        draw(e);
    }

    function stopDrawing() {
        drawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);

        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#2563eb'; // لون القلم أزرق مدرسي

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function clearCanvas() {
        init();
    }

    function speakText(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    // أحداث الماوس واللمس
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);

    // التشغيل عند التحميل
    window.onload = init;
</script>

</body>
</html>
