<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Letter Aa - School Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --paper-white: #ffffff;
            --line-red: #ff8585;
            --line-blue: #a3b8ff;
            --ink-blue: #1e40af;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Comic Neue', cursive;
            color: #f8fafc;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .workbook-page {
            background: var(--paper-white);
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #334155;
        }

        .header {
            text-align: center;
            border-bottom: 3px dashed #cbd5e1;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .letter-display {
            font-size: 5rem;
            color: #1e293b;
            margin: 10px 0;
        }

        .canvas-container {
            position: relative;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            touch-action: none;
            cursor: url('https://cdn-icons-png.flaticon.com/32/595/595582.png'), auto;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-clear { background: #ef4444; color: white; }
        .btn-speak { background: #3b82f6; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        .examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .example-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .example-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .example-card h4 { font-size: 1.4rem; color: #1e40af; }
    </style>
</head>
<body>

<div class="workbook-page">
    <div class="header">
        <h1>Handwriting Practice</h1>
        <div class="letter-display">Aa</div>
        <p>Follow the lines and trace the letter <strong>A</strong></p>
    </div>

    <div class="canvas-container">
        <canvas id="writingCanvas" width="800" height="400"></canvas>
    </div>

    <div class="toolbar">
        <button class="btn btn-clear" onclick="clearCanvas()">
            <i class="fas fa-eraser"></i> Clear Page
        </button>
        <button class="btn btn-speak" onclick="speak('Capital A, Small a. A is for Apple')">
            <i class="fas fa-volume-up"></i> Listen
        </button>
    </div>

    <div class="examples">
        <div class="example-card" onclick="speak('Apple')">
            <img src="https://cdn.pixabay.com/photo/2020/05/23/16/22/apple-5210665_640.jpg" alt="Apple">
            <h4>Apple</h4>
        </div>
        <div class="example-card" onclick="speak('Ant')">
            <img src="https://cdn.pixabay.com/photo/2016/04/19/18/01/ant-1339560_640.jpg" alt="Ant">
            <h4>Ant</h4>
        </div>
        <div class="example-card" onclick="speak('Astronaut')">
            <img src="https://cdn.pixabay.com/photo/2017/08/24/11/15/astronaut-2676322_640.jpg" alt="Astronaut">
            <h4>Astronaut</h4>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('writingCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // إعدادات الأسطر المدرسية
    const lineSpacing = 80;
    const startY = 80;
    const schoolLines = [startY, startY + lineSpacing, startY + 2 * lineSpacing, startY + 3 * lineSpacing];

    function setupCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم الأسطر الأربعة
        schoolLines.forEach((y, i) => {
            ctx.beginPath();
            ctx.lineWidth = (i === 0 || i === 3) ? 2 : 1;
            ctx.strokeStyle = (i === 0 || i === 3) ? '#ff8585' : '#a3b8ff';
            ctx.setLineDash([]);
            ctx.moveTo(40, y);
            ctx.lineTo(canvas.width - 40, y);
            ctx.stroke();
        });

        // رسم الحروف المنقطة للتتبع (Tracing)
        ctx.font = '220px "Comic Neue"';
        ctx.fillStyle = '#f1f5f9'; // لون باهت جداً
        ctx.textAlign = 'center';
        
        // Capital A (بين السطر 1 و 3)
        ctx.fillText('A', 250, schoolLines[2]);
        
        // Small a (بين السطر 2 و 3)
        ctx.fillText('a', 550, schoolLines[2]);

        // تسمية الأسطر للأهل/المعلم
        ctx.font = '14px Arial';
        ctx.fillStyle = '#cbd5e1';
        ctx.fillText('Sky Line', 80, schoolLines[0] - 10);
        ctx.fillText('Ground Line', 80, schoolLines[2] + 20);
    }

    // وظائف الرسم بالحبر الأزرق
    function startDraw(e) {
        isDrawing = true;
        draw(e);
    }

    function draw(e) {
        if (!isDrawing) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#1e40af'; // لون قلم الحبر

        ctx.lineTo(x * (canvas.width / rect.width), y * (canvas.height / rect.height));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x * (canvas.width / rect.width), y * (canvas.height / rect.height));
    }

    function stopDraw() {
        isDrawing = false;
        ctx.beginPath();
    }

    function clearCanvas() {
        setupCanvas();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stopDraw);

    window.onload = setupCanvas;
</script>

</body>
</html>
