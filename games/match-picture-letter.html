<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Match Picture to Letter | Phonics Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(56,189,248,0.3);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a5f3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .instructions {
            margin-bottom: 2rem;
            color: #cbd5e1;
        }

        .game-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        /* Pictures section */
        .pictures {
            flex: 1;
            min-width: 200px;
        }

        .letters {
            flex: 1;
            min-width: 150px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #38bdf8;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            justify-items: center;
        }

        .picture-card, .letter-card {
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            width: 120px;
        }

        .picture-card:hover, .letter-card:hover {
            transform: scale(1.02);
            background: #334155;
        }

        .picture-card.selected, .letter-card.selected {
            background: #f39c12;
            border-color: #f39c12;
            transform: scale(1.02);
        }

        .picture-card.disabled, .letter-card.disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .picture-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .picture-card span {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .letter-card {
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 120px;
        }

        .score-area {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .message {
            margin: 1rem 0;
            padding: 0.5rem;
            border-radius: 2rem;
            font-weight: bold;
        }

        .message.success {
            background: #2ecc71;
            color: white;
        }

        .message.error {
            background: #e74c3c;
            color: white;
        }

        .reset-btn {
            background: #475569;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #38bdf8;
            text-decoration: none;
        }

        @media (max-width: 700px) {
            .game-board {
                flex-direction: column;
                align-items: center;
            }
            .picture-card, .letter-card {
                width: 100px;
            }
            .picture-card img {
                width: 70px;
                height: 70px;
            }
            .letter-card {
                height: 100px;
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1><i class="fas fa-puzzle-piece"></i> Match Picture to Letter</h1>
    <div class="instructions">
        <p>Click on a picture, then click on the letter it starts with. Match all 4 pairs!</p>
    </div>

    <div class="game-board">
        <!-- Pictures side -->
        <div class="pictures">
            <div class="section-title"><i class="fas fa-image"></i> Pictures</div>
            <div id="picturesGrid" class="cards-grid"></div>
        </div>

        <!-- Letters side -->
        <div class="letters">
            <div class="section-title"><i class="fas fa-font"></i> Letters</div>
            <div id="lettersGrid" class="cards-grid"></div>
        </div>
    </div>

    <div id="messageArea" class="message"></div>
    <div class="score-area">
        Matched: <span id="matchedCount">0</span> / <span id="totalPairs">4</span>
    </div>
    <button id="resetBtn" class="reset-btn"><i class="fas fa-undo-alt"></i> New Game</button>
    <div>
        <a href="../index.html" class="back-link"><i class="fas fa-home"></i> Back to Main</a>
    </div>
</div>

<script>
    // Data for the game: each item has picture details and the matching letter
    const gameData = [
        { 
            letter: "A", 
            picture: { name: "Apple", img: "../images/apple.jpg", fallback: "🍎" } 
        },
        { 
            letter: "B", 
            picture: { name: "Ball", img: "../images/ball.jpg", fallback: "⚽" } 
        },
        { 
            letter: "C", 
            picture: { name: "Cat", img: "../images/cat.jpg", fallback: "🐱" } 
        },
        { 
            letter: "D", 
            picture: { name: "Dog", img: "../images/dog.jpg", fallback: "🐕" } 
        }
    ];

    // Track game state
    let pictures = [];
    let letters = [];
    let selectedType = null; // 'picture' or 'letter'
    let selectedId = null;
    let matchedCount = 0;
    const totalPairs = gameData.length;

    // DOM elements
    const picturesGrid = document.getElementById('picturesGrid');
    const lettersGrid = document.getElementById('lettersGrid');
    const matchedSpan = document.getElementById('matchedCount');
    const messageDiv = document.getElementById('messageArea');

    // Helper to shuffle array (used for initial order)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Initialize game data
    function initGame() {
        // Create pictures array from gameData
        pictures = gameData.map((item, idx) => ({
            id: idx,
            letter: item.letter,
            name: item.picture.name,
            img: item.picture.img,
            fallback: item.picture.fallback,
            matched: false
        }));
        // Create letters array
        letters = gameData.map((item, idx) => ({
            id: idx,
            letter: item.letter,
            matched: false
        }));
        // Shuffle both arrays for variety
        pictures = shuffleArray(pictures);
        letters = shuffleArray(letters);
        
        selectedType = null;
        selectedId = null;
        matchedCount = 0;
        matchedSpan.textContent = matchedCount;
        messageDiv.innerHTML = '';
        messageDiv.className = 'message';
        
        renderGame();
    }

    // Render pictures and letters
    function renderGame() {
        // Render pictures
        picturesGrid.innerHTML = '';
        pictures.forEach(pic => {
            const card = document.createElement('div');
            card.className = 'picture-card';
            if (pic.matched) card.classList.add('disabled');
            if (selectedType === 'picture' && selectedId === pic.id) card.classList.add('selected');
            
            const img = document.createElement('img');
            img.src = pic.img;
            img.alt = pic.name;
            img.onerror = () => {
                img.outerHTML = `<span style="font-size: 2rem;">${pic.fallback}</span>`;
            };
            card.appendChild(img);
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = pic.name;
            card.appendChild(nameSpan);
            
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (pic.matched) return;
                // Handle picture click
                if (selectedType === null) {
                    // No selection: select this picture
                    clearSelection();
                    selectedType = 'picture';
                    selectedId = pic.id;
                    renderGame();
                } else if (selectedType === 'letter') {
                    // We have a letter selected: attempt to match
                    const letterObj = letters.find(l => l.id === selectedId);
                    if (letterObj && !letterObj.matched) {
                        attemptMatch(pic, letterObj);
                    }
                    clearSelection();
                    renderGame();
                } else {
                    // Already selected a picture: switch selection to this picture
                    clearSelection();
                    selectedType = 'picture';
                    selectedId = pic.id;
                    renderGame();
                }
            });
            picturesGrid.appendChild(card);
        });
        
        // Render letters
        lettersGrid.innerHTML = '';
        letters.forEach(letter => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            if (letter.matched) card.classList.add('disabled');
            if (selectedType === 'letter' && selectedId === letter.id) card.classList.add('selected');
            card.textContent = letter.letter;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                if (letter.matched) return;
                if (selectedType === null) {
                    clearSelection();
                    selectedType = 'letter';
                    selectedId = letter.id;
                    renderGame();
                } else if (selectedType === 'picture') {
                    const pictureObj = pictures.find(p => p.id === selectedId);
                    if (pictureObj && !pictureObj.matched) {
                        attemptMatch(pictureObj, letter);
                    }
                    clearSelection();
                    renderGame();
                } else {
                    clearSelection();
                    selectedType = 'letter';
                    selectedId = letter.id;
                    renderGame();
                }
            });
            lettersGrid.appendChild(card);
        });
    }
    
    function attemptMatch(picture, letter) {
        if (picture.matched || letter.matched) {
            showMessage("One of these is already matched!", "error");
            return;
        }
        if (picture.letter === letter.letter) {
            // Correct match
            picture.matched = true;
            letter.matched = true;
            matchedCount++;
            matchedSpan.textContent = matchedCount;
            showMessage(`Correct! ${picture.name} starts with ${letter.letter}.`, "success");
            if (matchedCount === totalPairs) {
                showMessage("🎉 Congratulations! You matched all pairs! 🎉", "success");
            }
        } else {
            // Wrong match
            showMessage(`Oops! ${picture.name} does not start with ${letter.letter}. Try again!`, "error");
        }
        // Re-render to reflect changes and clear selection
        renderGame();
    }
    
    function clearSelection() {
        selectedType = null;
        selectedId = null;
    }
    
    function showMessage(msg, type) {
        messageDiv.textContent = msg;
        messageDiv.className = `message ${type}`;
        setTimeout(() => {
            if (messageDiv.textContent === msg) {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }
        }, 2000);
    }
    
    function resetGame() {
        initGame();
    }
    
    // Start game
    initGame();
    
    document.getElementById('resetBtn').addEventListener('click', resetGame);
</script>
</body>
</html>
