<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Computer Teacher – Letter Tic‑Tac‑Toe | Phonics Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(20,30,50,0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255,179,71,0.3);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a5f3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .level-btn {
            background: #1e293b;
            border: 1px solid #38bdf8;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .level-btn.active { background: #f39c12; border-color: #f39c12; color: #0f172a; }
        .board {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 10px;
            margin: 1rem 0;
        }
        .cell {
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 1rem;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 2rem;
            font-weight: bold;
            color: #e2e8f0;
        }
        .cell.marked { background: #2ecc71; border-color: #2ecc71; cursor: default; opacity: 0.7; }
        .instruction { font-size: 1.2rem; margin: 1rem 0; }
        .current-word {
            background: #2c3e50;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .message { font-size: 1.1rem; margin: 0.5rem 0; font-weight: bold; }
        .reset-btn {
            background: #38bdf8;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #38bdf8;
            text-decoration: none;
        }
        @media (max-width: 600px) { .cell { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="game-container">
    <h1><i class="fas fa-chalkboard-teacher"></i> Computer Teacher</h1>
    <div class="level-selector">
        <button data-level="1" class="level-btn active">Level 1 (A‑I)</button>
        <button data-level="2" class="level-btn">Level 2 (A‑M)</button>
        <button data-level="3" class="level-btn">Level 3 (A‑P)</button>
    </div>
    <div class="board" id="board"></div>
    <div class="current-word" id="currentLetter"></div>
    <div class="instruction" id="instruction">Click on the letter you hear 👂</div>
    <div id="message" class="message"></div>
    <button id="resetBtn" class="reset-btn">New Game</button>
    <div><a href="../index.html" class="back-link"><i class="fas fa-home"></i> Back to Main</a></div>
</div>
<script>
    const letterSets = { 1:['A','B','C','D','E','F','G','H','I'], 2:['A','B','C','D','E','F','G','H','I','J','K','L','M'], 3:['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P'] };
    let currentLevel = 1;
    let board = [], gameActive = true, waitingForClick = false, currentTargetLetter = null;
    let cells = [];

    function generateBoard() {
        const letters = letterSets[currentLevel];
        const newBoard = [];
        for (let i=0; i<9; i++) {
            newBoard.push({ letter: letters[Math.floor(Math.random()*letters.length)], marked: false });
        }
        return newBoard;
    }
    function renderBoard() {
        for (let i=0; i<9; i++) {
            const cell = cells[i];
            cell.textContent = board[i].letter;
            if (board[i].marked) cell.classList.add('marked');
            else cell.classList.remove('marked');
        }
    }
    function speakLetter(letter) {
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(letter);
        u.lang='en-US'; u.rate=0.8;
        window.speechSynthesis.speak(u);
    }
    function speakMessage(msg) {
        if(!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(msg);
        u.lang='en-US'; u.rate=0.9;
        window.speechSynthesis.speak(u);
    }
    function checkWin() {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return lines.some(line => line.every(idx => board[idx].marked === true));
    }
    function isBoardFull() { return board.every(cell => cell.marked); }
    function pickRandomUnmarked() {
        const unmarked = board.filter(c => !c.marked);
        if(!unmarked.length) return null;
        return unmarked[Math.floor(Math.random()*unmarked.length)].letter;
    }
    function startNewRound() {
        if(!gameActive) return;
        const nextLetter = pickRandomUnmarked();
        if(!nextLetter) {
            if(!checkWin()) { document.getElementById('message').innerHTML = '🎉 Draw!'; gameActive=false; waitingForClick=false; document.getElementById('currentLetter').innerHTML=''; }
            return;
        }
        currentTargetLetter = nextLetter;
        document.getElementById('currentLetter').innerHTML = `🔊 Listen: ${currentTargetLetter}`;
        document.getElementById('instruction').innerHTML = 'Click on the cell with this letter';
        waitingForClick = true;
        speakLetter(currentTargetLetter);
    }
    function handleCellClick(idx) {
        if(!gameActive || !waitingForClick) return;
        if(board[idx].marked) return;
        if(board[idx].letter === currentTargetLetter) {
            board[idx].marked = true;
            renderBoard();
            waitingForClick = false;
            document.getElementById('instruction').innerHTML = '✅ Good! Next letter...';
            if(checkWin()) {
                gameActive=false;
                document.getElementById('message').innerHTML = '🏆 You win! 🏆';
                speakMessage('Congratulations! You won!');
                return;
            }
            if(isBoardFull()) {
                gameActive=false;
                document.getElementById('message').innerHTML = '🎉 Draw!';
                speakMessage('Draw!');
                return;
            }
            setTimeout(() => startNewRound(), 800);
        } else {
            document.getElementById('instruction').innerHTML = '❌ Wrong! Try again.';
            document.getElementById('message').innerHTML = `The letter was ${currentTargetLetter}. Click the correct cell.`;
            speakLetter(currentTargetLetter);
            setTimeout(() => { document.getElementById('instruction').innerHTML = 'Click on the cell with this letter'; document.getElementById('message').innerHTML=''; }, 1500);
        }
    }
    function resetGame() {
        board = generateBoard();
        gameActive = true;
        waitingForClick = false;
        currentTargetLetter = null;
        document.getElementById('message').innerHTML = '';
        document.getElementById('instruction').innerHTML = 'Click on the letter you hear 👂';
        document.getElementById('currentLetter').innerHTML = '';
        renderBoard();
        setTimeout(() => startNewRound(), 300);
    }
    function changeLevel(level) {
        currentLevel = level;
        resetGame();
    }
    function createBoardUI() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        cells = [];
        for(let i=0; i<9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.addEventListener('click', (function(idx){ return function(){ handleCellClick(idx); }; })(i));
            boardDiv.appendChild(cell);
            cells.push(cell);
        }
    }
    createBoardUI();
    resetGame();
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const lvl = parseInt(btn.getAttribute('data-level'));
            changeLevel(lvl);
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    document.getElementById('resetBtn').addEventListener('click', resetGame);
</script>
</body>
</html>
