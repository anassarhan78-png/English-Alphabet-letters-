<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Match Picture to Letter | Phonics Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255,179,71,0.3);
        }
        h1 { font-size: 2rem; background: linear-gradient(135deg, #FFB347, #FF6B6B); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 1rem; }
        .sub { color: #FFE0B5; margin-bottom: 2rem; }
        .game-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }
        .pictures, .letters {
            flex: 1;
            min-width: 200px;
        }
        .section-title { font-size: 1.2rem; margin-bottom: 1rem; color: #FFB347; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
            gap: 1rem;
            justify-items: center;
        }
        .picture-card, .letter-card {
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            width: 120px;
            transition: 0.2s;
        }
        .picture-card.selected, .letter-card.selected {
            background: #f39c12;
            border-color: #f39c12;
            transform: scale(1.02);
        }
        .picture-card.disabled, .letter-card.disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .picture-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .letter-card { font-size: 3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; height: 120px; }
        .score-area { margin-top: 1.5rem; font-size: 1.2rem; }
        .message { margin: 1rem 0; padding: 0.5rem; border-radius: 2rem; font-weight: bold; }
        .message.correct { background: #2ecc71; color: white; }
        .message.wrong { background: #e74c3c; color: white; }
        .reset-btn { background: #f39c12; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; margin-top: 1rem; }
        .back-link { display: inline-block; margin-top: 1rem; color: #38bdf8; text-decoration: none; }
        @media (max-width: 700px) {
            .picture-card, .letter-card { width: 100px; }
            .picture-card img { width: 70px; height: 70px; }
            .letter-card { height: 100px; font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1><i class="fas fa-puzzle-piece"></i> Match Picture to Letter</h1>
    <div class="sub">Click a picture, then click its matching letter!</div>
    <div class="game-board">
        <div class="pictures">
            <div class="section-title">🖼️ Pictures</div>
            <div id="picturesGrid" class="cards-grid"></div>
        </div>
        <div class="letters">
            <div class="section-title">🔠 Letters</div>
            <div id="lettersGrid" class="cards-grid"></div>
        </div>
    </div>
    <div class="score-area">Matched: <span id="matchedCount">0</span> / <span id="totalPairs">4</span></div>
    <div id="messageBox" class="message"></div>
    <button id="resetBtn" class="reset-btn"><i class="fas fa-undo-alt"></i> New Game</button>
    <div><a href="../index.html" class="back-link"><i class="fas fa-home"></i> Back to Main</a></div>
</div>
<script>
    const gameData = [
        { letter: "A", picture: { name: "Apple", img: "../images/apple.jpg", fallback: "🍎" } },
        { letter: "B", picture: { name: "Ball", img: "../images/ball.jpg", fallback: "⚽" } },
        { letter: "C", picture: { name: "Cat", img: "../images/cat.jpg", fallback: "🐱" } },
        { letter: "D", picture: { name: "Dog", img: "../images/dog.jpg", fallback: "🐕" } }
    ];
    let pictures = [], letters = [];
    let selectedType = null, selectedId = null, matchedCount = 0;
    function shuffle(arr) {
        for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
        return arr;
    }
    function initGame() {
        pictures = gameData.map((item,idx)=>({id:idx, letter:item.letter, name:item.picture.name, img:item.picture.img, fallback:item.picture.fallback, matched:false}));
        letters = gameData.map((item,idx)=>({id:idx, letter:item.letter, matched:false}));
        pictures = shuffle(pictures);
        letters = shuffle(letters);
        selectedType = null; selectedId = null; matchedCount = 0;
        document.getElementById('matchedCount').innerText = matchedCount;
        document.getElementById('totalPairs').innerText = gameData.length;
        render();
    }
    function render() {
        const picsDiv = document.getElementById('picturesGrid');
        picsDiv.innerHTML = '';
        pictures.forEach(pic => {
            const card = document.createElement('div');
            card.className = 'picture-card';
            if (pic.matched) card.classList.add('disabled');
            if (selectedType==='picture' && selectedId===pic.id) card.classList.add('selected');
            const img = document.createElement('img');
            img.src = pic.img; img.onerror = () => { img.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='55' font-size='40' text-anchor='middle' fill='white'%3E${pic.fallback}%3C/text%3E%3C/svg%3E`; };
            card.appendChild(img);
            const nameSpan = document.createElement('span'); nameSpan.textContent = pic.name; card.appendChild(nameSpan);
            card.onclick = () => { if(pic.matched) return; if(selectedType==='picture' && selectedId===pic.id) { selectedType=null; selectedId=null; } else { selectedType='picture'; selectedId=pic.id; } render(); };
            picsDiv.appendChild(card);
        });
        const lettersDiv = document.getElementById('lettersGrid');
        lettersDiv.innerHTML = '';
        letters.forEach(letter => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            if (letter.matched) card.classList.add('disabled');
            if (selectedType==='letter' && selectedId===letter.id) card.classList.add('selected');
            card.textContent = letter.letter;
            card.onclick = () => {
                if(letter.matched) return;
                if(selectedType==='letter' && selectedId===letter.id) { selectedType=null; selectedId=null; }
                else if(selectedType==='picture') {
                    const picture = pictures.find(p=>p.id===selectedId);
                    if(picture && !picture.matched) attemptMatch(picture, letter);
                    selectedType=null; selectedId=null;
                } else { selectedType='letter'; selectedId=letter.id; }
                render();
            };
            lettersDiv.appendChild(card);
        });
    }
    function attemptMatch(picture, letter) {
        if(picture.matched || letter.matched) return;
        if(picture.letter === letter.letter) {
            picture.matched = true; letter.matched = true;
            matchedCount++;
            document.getElementById('matchedCount').innerText = matchedCount;
            showMessage(`✅ Correct! ${picture.name} starts with ${letter.letter}.`, 'correct');
            speakText(`Correct! ${picture.name} starts with ${letter.letter}.`);
            if(matchedCount === gameData.length) showMessage('🎉 Congratulations! You matched all pairs!', 'correct');
        } else {
            showMessage(`❌ ${picture.name} does not start with ${letter.letter}. Try again!`, 'wrong');
            speakText(`Oops! ${picture.name} does not start with ${letter.letter}.`);
        }
        render();
    }
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('messageBox');
        msgDiv.textContent = msg; msgDiv.className = `message ${type}`;
        setTimeout(() => { if(msgDiv.textContent === msg) msgDiv.innerHTML = ''; msgDiv.className = 'message'; }, 2000);
    }
    function speakText(text) { if(window.speechSynthesis){ window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=0.9; window.speechSynthesis.speak(u); } }
    initGame();
    document.getElementById('resetBtn').addEventListener('click', initGame);
</script>
</body>
</html>
