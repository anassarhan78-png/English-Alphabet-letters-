<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Trace & Learn | تتبع الحروف على السبورة التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(135deg, #1a472a, #2e7d5e);
            min-height: 100vh;
            font-family: 'Comic Neue', 'Inter', sans-serif;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .trace-container {
            max-width: 1400px;
            width: 100%;
            background: #fef7e8;
            border-radius: 60px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .trace-header {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            padding: 20px 25px;
            color: white;
            text-align: center;
        }
        .trace-header h1 { font-size: 2rem; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .trace-header h1 i { background: white; color: #e67e22; padding: 12px; border-radius: 50%; }
        .letter-selector { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .letter-btn {
            background: rgba(255,255,255,0.25); border: 2px solid white; padding: 10px 25px;
            font-size: 1.8rem; font-weight: bold; border-radius: 60px; cursor: pointer;
            transition: all 0.2s; color: white; font-family: monospace;
        }
        .letter-btn.active { background: white; color: #e67e22; transform: scale(1.05); }
        .case-selector { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
        .case-btn {
            background: rgba(255,255,255,0.2); border: none; padding: 8px 25px;
            border-radius: 40px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white;
            transition: 0.2s;
        }
        .case-btn.active { background: #2c3e50; color: white; }
        .canvas-area { padding: 30px; background: #fffaf0; text-align: center; }
        .canvas-wrapper { background: white; border-radius: 40px; padding: 20px; box-shadow: inset 0 0 0 3px #ffe0b5, 0 15px 25px rgba(0,0,0,0.1); display: inline-block; width: 100%; }
        canvas { display: block; margin: 0 auto; background: white; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: crosshair; touch-action: none; width: 100%; height: auto; background-image: radial-gradient(circle, #f0f0f0 1px, transparent 1px); background-size: 25px 25px; }
        .control-bar { display: flex; justify-content: center; gap: 20px; margin-top: 25px; flex-wrap: wrap; }
        .ctrl-btn {
            background: #ecf0f1; border: none; padding: 12px 28px; border-radius: 50px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .ctrl-btn.primary { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .ctrl-btn.warning { background: #e67e22; color: white; }
        .ctrl-btn.danger { background: #e74c3c; color: white; }
        .ctrl-btn:active { transform: translateY(2px); }
        .guidance { background: #fef3e0; border-radius: 40px; padding: 20px; margin: 20px 30px 30px 30px; text-align: center; }
        .guidance h3 { color: #2c3e50; margin-bottom: 12px; }
        .feedback-big { font-size: 1.4rem; font-weight: bold; padding: 12px; border-radius: 60px; display: inline-block; margin-top: 10px; }
        .feedback-big.success { background: #d5f5e3; color: #27ae60; }
        .feedback-big.warning { background: #fef5e7; color: #e67e22; }
        .progress-bar-container { background: #e0e0e0; border-radius: 30px; height: 12px; width: 100%; max-width: 400px; margin: 15px auto; overflow: hidden; }
        .progress-fill { background: #2ecc71; width: 0%; height: 100%; transition: width 0.3s; }
        .trace-tip { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 15px; font-size: 0.9rem; color: #7f8c8d; }
        .back-link { display: inline-block; margin: 15px 25px 25px 25px; background: #2c3e50; color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        @media (max-width: 800px) {
            .trace-header h1 { font-size: 1.4rem; }
            .letter-btn { font-size: 1.3rem; padding: 6px 18px; }
            .ctrl-btn { padding: 8px 18px; font-size: 0.8rem; }
            .feedback-big { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="trace-container">
    <div class="trace-header">
        <h1><i class="fas fa-chalkboard-teacher"></i> Trace & Learn على السبورة التفاعلية <i class="fas fa-pencil-ruler"></i></h1>
        <div class="letter-selector" id="letterSelector"></div>
        <div class="case-selector" id="caseSelector">
            <button class="case-btn active" data-case="upper">🔠 Capital (كبير)</button>
            <button class="case-btn" data-case="lower">🔡 Small (صغير)</button>
        </div>
    </div>

    <div class="canvas-area">
        <div class="canvas-wrapper">
            <canvas id="traceCanvas" width="900" height="600" style="width:100%; height:auto; max-width:100%; aspect-ratio:900/600"></canvas>
        </div>
        <div class="control-bar">
            <button class="ctrl-btn danger" id="clearBtn"><i class="fas fa-eraser"></i> مسح الكل</button>
            <button class="ctrl-btn primary" id="speakLetterBtn"><i class="fas fa-volume-up"></i> استمع للحرف</button>
            <button class="ctrl-btn warning" id="checkTraceBtn"><i class="fas fa-check-double"></i> تقييم التتبع</button>
            <button class="ctrl-btn" id="showGuideBtn"><i class="fas fa-lightbulb"></i> إرشادات المسار</button>
        </div>
    </div>

    <div class="guidance">
        <h3><i class="fas fa-hand-pointer"></i> كيف تتتبع الحرف؟</h3>
        <div id="liveFeedback" class="feedback-big warning"><i class="fas fa-arrow-right"></i> اضغط على الحرف واتبع الخط المنقط</div>
        <div class="progress-bar-container"><div class="progress-fill" id="traceProgressFill"></div></div>
        <div class="trace-tip">
            <span><i class="fas fa-dot-circle"></i> النقاط الحمراء = نقطة البداية</span>
            <span><i class="fas fa-flag-checkered"></i> النجمة = نقطة النهاية</span>
            <span><i class="fas fa-chart-line"></i> حاول تتبع الخط الرمادي</span>
        </div>
    </div>

    <a href="index.html" class="back-link"><i class="fas fa-home"></i> العودة للبوابة الرئيسية</a>
</div>

<script>
    const canvas = document.getElementById('traceCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let currentLetter = 'A';
    let currentCase = 'upper';
    
    function resizeCanvas() { canvas.width = 900; canvas.height = 600; drawLetterOutline(); }
    
    function drawLetterOutline() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const letter = currentCase === 'upper' ? currentLetter : currentLetter.toLowerCase();
        const fontSize = 380;
        ctx.font = `bold ${fontSize}px "Comic Neue", "Comic Sans MS", "Segoe UI Emoji", cursive`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.1)";
        ctx.shadowBlur = 8;
        ctx.setLineDash([12, 18]);
        ctx.lineWidth = 6;
        ctx.strokeStyle = "#b0bec5";
        ctx.fillStyle = "#f0f0f0";
        ctx.fillText(letter, canvas.width/2, canvas.height/2);
        ctx.strokeText(letter, canvas.width/2, canvas.height/2);
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
        drawStartEndMarkers(letter);
    }
    
    function drawStartEndMarkers(letter) {
        const centerX = canvas.width/2;
        const centerY = canvas.height/2;
        let startX = centerX - 140, startY = centerY - 140;
        let endX = centerX + 120, endY = centerY + 130;
        if (currentLetter === 'A' && currentCase === 'upper') { startX = centerX - 40; startY = centerY - 170; endX = centerX - 20; endY = centerY + 140; }
        else if (currentLetter === 'a' && currentCase === 'lower') { startX = centerX - 70; startY = centerY - 80; endX = centerX + 70; endY = centerY + 70; }
        else if (currentLetter === 'B' && currentCase === 'upper') { startX = centerX - 130; startY = centerY - 150; endX = centerX - 100; endY = centerY + 150; }
        else if (currentLetter === 'b' && currentCase === 'lower') { startX = centerX - 110; startY = centerY - 130; endX = centerX - 80; endY = centerY + 130; }
        ctx.beginPath();
        ctx.arc(startX, startY, 18, 0, 2 * Math.PI);
        ctx.fillStyle = "#e74c3c";
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = "bold 18px 'Comic Neue'";
